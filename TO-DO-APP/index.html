<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Practice</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>To-Do- List App</h1>
      <button id="createTask">Create Task</button>
      <input
        type="text"
        id="inputTask"
        style="display: none"
        placeholder="Enter Task Here..."
      />
      <div class="btns">
        <button id="addBtn" style="display: none">Add</button>
        <button id="doneBtn" style="display: none">Done</button>
      </div>
      <h3 id="heading" style="display: none">List of Tasks:</h3>
      <ol id="taskList"></ol>
    </div>

    <script src="script.js"></script>
  </body>
</html>
